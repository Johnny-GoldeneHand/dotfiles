general {
	border_size			=	1		#size of the border around windows
	gaps_in				=	5		#gaps between windows, also supports css style gaps (top, right, bottom, left -> 5,10,15,20)	int	5
	gaps_out			=	20		#gaps between windows and monitor edges, also supports css style gaps (top, right, bottom, left -> 5,10,15,20)	int	20
	float_gaps			=	0		#gaps between windows and monitor edges for floating windows, also supports css style gaps (top, right, bottom, left -> 5 10 15 20). -1 means default	int	0
	gaps_workspaces			=	0		#gaps between workspaces. Stacks with gaps_out.	int	0
	col.inactive_border		=	0xff444444	#border color for inactive windows	gradient	0xff444444
	col.active_border		=	0xffffffff	#border color for the active window	gradient	0xffffffff
	col.nogroup_border		=	0xffffaaff	#inactive border color for window that cannot be added to a group (see denywindowfromgroup dispatcher)	gradient	0xffffaaff
	col.nogroup_border_active	=	0xffff00ff	#active border color for window that cannot be added to a group	gradient	0xffff00ff
	layout				=	dwindle		#which layout to use. [dwindle/master]	str	dwindle
	no_focus_fallback		=	false		#if true, will not fall back to the next	available window when moving focus in a direction where no window was found	bool	false
	resize_on_border		=	false		#enables resizing windows by clicking and dragging on borders and gaps	bool	false
	extend_border_grab_area		=	15		#extends the area around the border where you can click and drag on, only used when general:resize_on_border is on.	int	15
	hover_icon_on_border		=	true		#show a cursor icon when hovering over borders, only used when general:resize_on_border is on.	bool	true
	allow_tearing			=	false		#master switch for allowing tearing to occur. See the Tearing page.	bool	false
	resize_corner			=	0		#force floating windows to use a specific corner when being resized (1-4 going clockwise from top left, 0 to disable)	int	0
	modal_parent_blocking		=	true		#whether parent windows of modals will be interactive	bool	true
	snap {
		enabled		=	false	#enable snapping for floating windows	bool	false
		window_gap	=	10	#minimum gap in pixels between windows before snapping	int	10
		monitor_gap	=	10	#minimum gap in pixels between window and monitor edges before snapping	int	10
		border_overlap	=	false	#if true, windows snap such that only one border’s worth of space is between them	bool	false
		respect_gaps	=	false	#if true, snapping will respect gaps between windows(set in general:gaps_in)	bool	false
		}
	}
	decoration {
		rounding		=	5	#rounded corners’ radius (in layout px)	int	0
		rounding_power		=	2.0	#adjusts the curve used for rounding corners, larger is smoother, 2.0 is a circle, 4.0 is a squircle, 1.0 is a triangular corner. [1.0 - 10.0]	float	2.0
		active_opacity		=	0.9	#opacity of active windows. [0.0 - 1.0]	float	1.0
		inactive_opacity	=	0.8	#opacity of inactive windows. [0.0 - 1.0]	float	1.0
		fullscreen_opacity	=	1.0	#opacity of fullscreen windows. [0.0 - 1.0]	float	1.0
		dim_modal		=	true	#enables dimming of parents of modal windows	bool	true
		dim_inactive		=	false	#enables dimming of inactive windows	bool	false
		dim_strength		=	0.5	#how much inactive windows should be dimmed [0.0 - 1.0]	float	0.5
		dim_special		=	0.2	#how much to dim the rest of the screen by when a special workspace is open. [0.0 - 1.0]	float	0.2
		dim_around		=	0.4	#how much the dim_around window rule should dim by. [0.0 - 1.0]	float	0.4
		border_part_of_window	=	true	#whether the window border should be a part of the window	bool	true
			blur {
			enabled				=	true	#enable kawase window background blur	bool	true
			size				=	8	#blur size (distance)	int	8
			passes				=	1	#the amount of passes to perform	int	1
			ignore_opacity			=	true	#make the blur layer ignore the opacity of the window	bool	true
			new_optimizations		=	false	#whether to enable further optimizations to the blur. Recommended to leave on, as it will massively improve performance.	bool	true
			xray				=	false	#if enabled, floating windows will ignore tiled windows in their blur. Only available if new_optimizations is true. Will reduce overhead on floating blur significantly.	bool	false
			noise				=	0.0117	#how much noise to apply. [0.0 - 1.0]	float	0.0117
			contrast			=	0.8916	#contrast modulation for blur. [0.0 - 2.0]	float	0.8916
			brightness			=	0.8172	#brightness modulation for blur. [0.0 - 2.0]	float	0.8172
			vibrancy			=	0.1696	#Increase saturation of blurred colors. [0.0 - 1.0]	float	0.1696
			vibrancy_darkness		=	0.0	#How strong the effect of vibrancy is on dark areas . [0.0 - 1.0]	float	0.0
			special				=	false	#whether to blur behind the special workspace (note: expensive)	bool	false
			popups				=	false	#whether to blur popups (e.g. right-click menus)	bool	false
			popups_ignorealpha		=	0.2	#works like ignore_alpha in layer rules. If pixel opacity is below set value, will not blur. [0.0 - 1.0]	float	0.2
			input_methods			=	false	#whether to blur input methods (e.g. fcitx5)	bool	false
			input_methods_ignorealpha	=	0.2	#works like ignore_alpha in layer rules. If pixel opacity is below set value, will not blur. [0.0 - 1.0]	float	0.2
			}	
		}
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}
